<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="Prioritization board with ranked backlog bars">
  <defs>
    <linearGradient id="pmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241436"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#pmBg)"/>
  <!-- whiteboard -->
  <rect x="48" y="36" width="384" height="198" rx="8" fill="#160d24" stroke="#3d2a5c" stroke-width="2"/>
  <!-- header -->
  <text x="72" y="72" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b98cff" letter-spacing="3">RICE</text>
  <line x1="72" y1="84" x2="408" y2="84" stroke="#3d2a5c" stroke-width="1.5"/>
  <!-- ranked bars -->
  <g>
    <rect x="72" y="102" width="18" height="18" rx="3" fill="#8a2be2"/>
    <rect x="102" y="106" width="252" height="10" rx="5" fill="#8a2be2"/>
    <text x="368" y="116" font-family="Arial, sans-serif" font-size="12" fill="#b98cff">92</text>
  </g>
  <g>
    <rect x="72" y="136" width="18" height="18" rx="3" fill="#7326c4"/>
    <rect x="102" y="140" width="190" height="10" rx="5" fill="#7326c4"/>
    <text x="368" y="150" font-family="Arial, sans-serif" font-size="12" fill="#9d6ce0">71</text>
  </g>
  <g>
    <rect x="72" y="170" width="18" height="18" rx="3" fill="#5a1d9c"/>
    <rect x="102" y="174" width="124" height="10" rx="5" fill="#5a1d9c"/>
    <text x="368" y="184" font-family="Arial, sans-serif" font-size="12" fill="#8253c0">48</text>
  </g>
  <g>
    <rect x="72" y="204" width="18" height="18" rx="3" fill="#3f1470"/>
    <rect x="102" y="208" width="72" height="10" rx="5" fill="#3f1470"/>
    <text x="368" y="218" font-family="Arial, sans-serif" font-size="12" fill="#6a41a0">23</text>
  </g>
  <!-- north star -->
  <path d="M410 52 l4.5 9.5 10.5 1.5 -7.5 7.3 1.8 10.4 -9.3-4.9 -9.3 4.9 1.8-10.4 -7.5-7.3 10.5-1.5 z" fill="#e50914"/>
</svg>
