<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="Two-way bridge syncing an issue tracker and a chat workspace">
  <defs>
    <linearGradient id="sbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1233"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#sbBg)"/>

  <!-- left node: issue tracker board -->
  <g transform="translate(46 74)">
    <rect x="0" y="0" width="130" height="122" rx="8" fill="#170f2b" stroke="#4b3b7a" stroke-width="2"/>
    <rect x="14" y="16" width="30" height="8" rx="4" fill="#7c5cff"/>
    <g fill="#2b2150">
      <rect x="14" y="36" width="102" height="22" rx="4"/>
      <rect x="14" y="66" width="102" height="22" rx="4"/>
      <rect x="14" y="96" width="102" height="14" rx="4"/>
    </g>
    <g fill="#7c5cff">
      <circle cx="26" cy="47" r="4"/><circle cx="26" cy="77" r="4"/>
    </g>
    <g fill="#5a4a92">
      <rect x="38" y="43" width="62" height="6" rx="3"/>
      <rect x="38" y="73" width="46" height="6" rx="3"/>
    </g>
  </g>

  <!-- right node: chat channel -->
  <g transform="translate(304 74)">
    <rect x="0" y="0" width="130" height="122" rx="8" fill="#170f2b" stroke="#4b3b7a" stroke-width="2"/>
    <text x="14" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#7c5cff">#</text>
    <rect x="26" y="16" width="40" height="8" rx="4" fill="#7c5cff"/>
    <g>
      <circle cx="24" cy="48" r="7" fill="#3c9b7a"/>
      <rect x="38" y="40" width="76" height="6" rx="3" fill="#5a4a92"/>
      <rect x="38" y="52" width="52" height="6" rx="3" fill="#3a3168"/>
    </g>
    <g>
      <circle cx="24" cy="82" r="7" fill="#c2557a"/>
      <rect x="38" y="74" width="64" height="6" rx="3" fill="#5a4a92"/>
      <rect x="38" y="86" width="40" height="6" rx="3" fill="#3a3168"/>
    </g>
    <rect x="14" y="102" width="102" height="10" rx="5" fill="#241a45"/>
  </g>

  <!-- bridge: two-way arrows -->
  <g stroke="#a78bff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M186 112 H286"/>
    <path d="M276 102 L288 112 L276 122"/>
    <path d="M294 158 H194"/>
    <path d="M204 148 L192 158 L204 168"/>
  </g>
  <!-- packets in flight -->
  <g fill="#e0d4ff">
    <circle cx="214" cy="112" r="3.5"/><circle cx="246" cy="112" r="3.5" opacity="0.6"/>
    <circle cx="266" cy="158" r="3.5"/><circle cx="234" cy="158" r="3.5" opacity="0.6"/>
  </g>

  <text x="240" y="216" font-family="Arial, sans-serif" font-size="10" fill="#8b76c9" text-anchor="middle" letter-spacing="2">SOCKET MODE · REAL-TIME</text>
</svg>
