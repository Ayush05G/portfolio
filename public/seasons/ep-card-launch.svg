<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="Credit card product launch">
  <defs>
    <linearGradient id="clBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b0d10"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#8f0610"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a1216"/>
      <stop offset="100%" stop-color="#25090c"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#clBg)"/>
  <!-- back card -->
  <g transform="rotate(-12 240 135)">
    <rect x="128" y="72" width="224" height="132" rx="12" fill="url(#cardBack)" stroke="#4d1a1f" stroke-width="1.5"/>
  </g>
  <!-- front card -->
  <g transform="rotate(-6 240 135)">
    <rect x="140" y="86" width="224" height="132" rx="12" fill="url(#cardFace)"/>
    <!-- chip -->
    <rect x="164" y="118" width="30" height="24" rx="4" fill="#f5cf7a"/>
    <g stroke="#a37f2c" stroke-width="1.2">
      <line x1="164" y1="126" x2="194" y2="126"/><line x1="164" y1="134" x2="194" y2="134"/><line x1="179" y1="118" x2="179" y2="142"/>
    </g>
    <!-- contactless -->
    <g fill="none" stroke="#ffd9dc" stroke-width="2" stroke-linecap="round" opacity="0.85">
      <path d="M208 122 a10 10 0 0 1 0 16"/>
      <path d="M216 116 a18 18 0 0 1 0 28"/>
    </g>
    <!-- number -->
    <g fill="#ffe3e5" opacity="0.9">
      <rect x="164" y="164" width="34" height="7" rx="3.5"/>
      <rect x="206" y="164" width="34" height="7" rx="3.5"/>
      <rect x="248" y="164" width="34" height="7" rx="3.5"/>
      <rect x="290" y="164" width="34" height="7" rx="3.5"/>
    </g>
    <rect x="164" y="186" width="70" height="6" rx="3" fill="#ffb3b8" opacity="0.7"/>
    <circle cx="316" cy="192" r="13" fill="#ffffff" opacity="0.22"/>
    <circle cx="332" cy="192" r="13" fill="#ffffff" opacity="0.35"/>
  </g>
  <!-- launch sparks -->
  <g fill="#ff5a63">
    <circle cx="404" cy="70" r="4"/><circle cx="430" cy="102" r="3"/><circle cx="392" cy="118" r="2.5"/>
    <circle cx="70" cy="196" r="3.5"/><circle cx="48" cy="160" r="2.5"/><circle cx="92" cy="226" r="2.5"/>
  </g>
</svg>
