<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="Sprint completion rising from 40 percent to 75 percent">
  <defs>
    <linearGradient id="spBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="spFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0071eb" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0071eb" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#spBg)"/>
  <!-- gridlines -->
  <g stroke="#1e2c44" stroke-width="1">
    <line x1="64" y1="66" x2="432" y2="66"/>
    <line x1="64" y1="110" x2="432" y2="110"/>
    <line x1="64" y1="154" x2="432" y2="154"/>
    <line x1="64" y1="198" x2="432" y2="198"/>
  </g>
  <line x1="64" y1="222" x2="432" y2="222" stroke="#37496a" stroke-width="1.5"/>
  <!-- area under curve -->
  <path d="M84 176 L160 168 L236 140 L312 108 L388 84 L388 222 L84 222 Z" fill="url(#spFill)"/>
  <!-- trend line -->
  <polyline points="84,176 160,168 236,140 312,108 388,84" fill="none" stroke="#38a3ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- points -->
  <g fill="#0e1117" stroke="#38a3ff" stroke-width="3">
    <circle cx="84" cy="176" r="5"/><circle cx="160" cy="168" r="5"/><circle cx="236" cy="140" r="5"/><circle cx="312" cy="108" r="5"/>
  </g>
  <circle cx="388" cy="84" r="7" fill="#38a3ff"/>
  <!-- endpoint labels -->
  <text x="84" y="202" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#6f8bb0" text-anchor="middle">40%</text>
  <text x="388" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#8fd0ff" text-anchor="middle">75%</text>
  <text x="240" y="242" font-family="Arial, sans-serif" font-size="10" fill="#4d648a" text-anchor="middle" letter-spacing="2">SPRINT COMPLETION</text>
</svg>
